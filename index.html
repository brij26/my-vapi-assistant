<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Voice Assistant</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family: Arial, sans-serif;
      background:#f5f5f3;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .card{
      width:340px;
      background:white;
      border-radius:18px;
      padding:30px;
      text-align:center;
      box-shadow:0 4px 20px rgba(0,0,0,0.08);
    }

    .avatar{
      width:80px;
      height:80px;
      border-radius:50%;
      background:#e6f1fb;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:auto;
      font-size:36px;
    }

    h2{
      margin-top:16px;
      font-size:24px;
      color:#222;
    }

    .subtitle{
      margin-top:8px;
      font-size:14px;
      color:#666;
      line-height:1.5;
    }

    .status{
      margin-top:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-size:14px;
      color:#444;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:50%;
      background:#999;
    }

    .dot.live{
      background:#14a44d;
      animation:pulse 1s infinite;
    }

    @keyframes pulse{
      0%{opacity:1;}
      50%{opacity:0.3;}
      100%{opacity:1;}
    }

    button{
      width:100%;
      margin-top:22px;
      padding:14px;
      border:none;
      border-radius:12px;
      background:#185FA5;
      color:white;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      background:#0f4b86;
    }

    button.end{
      background:#c62828;
    }

    button.end:hover{
      background:#9b1f1f;
    }

    .note{
      margin-top:14px;
      font-size:12px;
      color:#999;
    }

    #transcript{
      margin-top:20px;
      max-height:220px;
      overflow-y:auto;
      text-align:left;
      border-top:1px solid #eee;
      padding-top:12px;
      display:none;
    }

    #transcript p{
      margin-bottom:10px;
      font-size:14px;
      line-height:1.5;
    }

    .user{
      color:#185FA5;
    }

    .bot{
      color:#14a44d;
    }
  </style>
</head>

<body>

<div class="card">

  <div class="avatar">🤖</div>

  <h2>AI Voice Assistant</h2>

  <p class="subtitle">
    Talk with your AI assistant directly from the browser
  </p>

  <div class="status">
    <span class="dot" id="dot"></span>
    <span id="statusText">Ready to connect</span>
  </div>

  <button id="callBtn">
    📞 Start Call
  </button>

  <div id="transcript"></div>

  <p class="note">
    No phone number needed · Uses your microphone
  </p>

</div>

<script type="module">

  import Vapi from "https://esm.sh/@vapi-ai/web";

  // =========================================
  // PUT YOUR VAPI PUBLIC KEY HERE
  // =========================================
  const PUBLIC_KEY = "38308316-bd09-45a0-894a-55af9a09eb11";

  // =========================================
  // PUT YOUR ASSISTANT ID HERE
  // =========================================
  const ASSISTANT_ID = "e6027c22-8da9-426d-b621-87da74856ae2";

  // Create Vapi instance
  const vapi = new Vapi(PUBLIC_KEY);

  let active = false;

  const callBtn = document.getElementById("callBtn");

  // =========================================
  // BUTTON CLICK
  // =========================================
  callBtn.addEventListener("click", async () => {

    try {

      if (!active) {

        active = true;

        setStatus("Connecting...", true);

        callBtn.textContent = "🔴 End Call";
        callBtn.classList.add("end");

        await vapi.start(ASSISTANT_ID);

      } else {

        vapi.stop();

      }

    } catch (err) {

      console.error(err);

      setStatus("Connection failed", false);

      active = false;

      callBtn.textContent = "📞 Start Call";
      callBtn.classList.remove("end");

    }

  });

  // =========================================
  // EVENTS
  // =========================================

  vapi.on("call-start", () => {

    setStatus("Connected · Speak now", true);

    document.getElementById("transcript").style.display = "block";

  });

  vapi.on("call-end", () => {

    active = false;

    setStatus("Call ended", false);

    callBtn.textContent = "📞 Start Call";

    callBtn.classList.remove("end");

  });

  vapi.on("speech-start", () => {

    setStatus("Agent speaking...", true);

  });

  vapi.on("speech-end", () => {

    setStatus("Listening...", true);

  });

  vapi.on("message", (message) => {

    console.log(message);

    if (message.type === "transcript") {

      addTranscript(
        message.role,
        message.transcript
      );

    }

  });

  vapi.on("error", (err) => {

    console.error("Vapi Error:", err);

    setStatus("Error occurred", false);

  });

  // =========================================
  // HELPERS
  // =========================================

  function setStatus(text, live = false) {

    document.getElementById("statusText").textContent = text;

    const dot = document.getElementById("dot");

    if (live) {
      dot.classList.add("live");
    } else {
      dot.classList.remove("live");
    }

  }

  function addTranscript(role, text) {

    const transcript = document.getElementById("transcript");

    const p = document.createElement("p");

    p.className = role === "user"
      ? "user"
      : "bot";

    p.textContent =
      (role === "user" ? "You: " : "Agent: ")
      + text;

    transcript.appendChild(p);

    transcript.scrollTop = transcript.scrollHeight;

  }

</script>

</body>
</html>
