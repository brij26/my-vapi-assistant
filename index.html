<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Brij Patel</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
        button:hover { background-color: #0056b3; }
    </style>
    <!-- Vapi Web SDK -->
    <script src="https://unpkg.com/@vapi-ai/web@latest"></script>
</head>
<body>
    <h1>Talk to Brij's AI Assistant</h1>
    <button id="vapi-btn">Start Interview</button>

    <script>
        // Replace these with your actual credentials
        const publicKey = '7fb0ee2c-8348-4172-8e00-216308ecc8b3';
        const assistantId = 'e6027c22-8da9-426d-b621-87da74856ae2';

        const vapi = new Vapi(publicKey);
        const button = document.getElementById('vapi-btn');

        button.addEventListener('click', () => {
            vapi.start(assistantId);
        });
    </script>
</body>
</html>
