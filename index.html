<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interview with Brij Patel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #121212; color: white; }
        h1 { margin-bottom: 20px; }
        .description { margin-bottom: 30px; color: #aaa; text-align: center; max-width: 500px; }
    </style>
</head>
<body>
    <h1>Brij Patel's AI Assistant</h1>
    <p class="description">Click the button below to start a voice or text-based interview. The interface will display a live transcript as we speak.</p>

    <script>
        var vapiInstance = null;
        const assistantId = 'e6027c22-8da9-426d-b621-87da74856ae2';
        const apiKey = 'YOUR_PUBLIC_KEY_HERE'; // REPLACE WITH YOUR vapi-pub- KEY

        (function (d, t) {
            var g = document.createElement(t),
                s = d.getElementsByTagName(t)[0];
            g.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
            g.defer = true;
            g.async = true;
            s.parentNode.insertBefore(g, s);
            
            g.onload = function () {
                vapiInstance = window.vapiSDK.run({
                    apiKey: apiKey,
                    assistant: assistantId,
                    config: {
                        // This enables the beautiful, built-in UI
                        showChat: true,
                        showTranscript: true,
                        position: "bottom-right"
                    }
                });
            };
        })(document, "script");
    </script>
</body>
</html>
