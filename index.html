<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interview Brij Patel</title>
    <!-- Use this specific UMD build which guarantees the Vapi variable -->
    <script src="https://unpkg.com/@vapi-ai/web@latest/dist/index.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f4f4f9; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Talk to Brij's AI Assistant</h1>
    <button id="vapi-btn">Start Interview</button>

    <script>
        // Wait for the script to load completely
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof Vapi === 'undefined') {
                console.error("Vapi library failed to load.");
                return;
            }

            const vapi = new Vapi('7fb0ee2c-8348-4172-8e00-216308ecc8b3');
            const button = document.getElementById('vapi-btn');

            button.addEventListener('click', () => {
                vapi.start('e6027c22-8da9-426d-b621-87da74856ae2');
            });
        });
    </script>
</body>
</html>
