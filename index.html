<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview with Brij Patel</title>
    <style>
        body { 
            font-family: sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            background-color: #121212; 
            color: white; 
        }
    </style>
</head>
<body>
    <h1>Brij Patel's AI Assistant</h1>
    <p>The chat interface will appear in the bottom-right corner.</p>

    <script>
        (function (d, t) {
            var g = document.createElement(t),
                s = d.getElementsByTagName(t)[0];
            g.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
            g.defer = true;
            g.async = true;
            s.parentNode.insertBefore(g, s);
            
            g.onload = function () {
                window.vapiSDK.run({
                    apiKey: process.env.VAPI_PUBLIC_KEY, // REPLACE WITH YOUR vapi-pub- KEY
                    assistant: "e6027c22-8da9-426d-b621-87da74856ae2",
                    config: {
                        mode: "chat",           // Forces text-only mode
                        showChat: true,         // Shows the input box
                        showTranscript: true,   // Shows the conversation history
                        position: "bottom-right"
                    }
                });
            };
        })(document, "script");
    </script>
</body>
</html>
