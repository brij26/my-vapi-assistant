<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>
    AI Persona Assistant
  </title>

  <link
    rel="stylesheet"
    href="style.css"
  />

</head>

<body>

  <div class="container">

    <div class="card">

      <!-- AVATAR -->

      <div class="avatar">
        🤖
      </div>

      <!-- TITLE -->

      <h2>
        AI Representative
      </h2>

      <p class="subtitle">

        Voice + Chat AI assistant powered by
        resume knowledge, GitHub projects,
        and real-time AI responses

      </p>

      <!-- STATUS -->

      <div class="status">

        <span
          class="dot"
          id="dot"
        ></span>

        <span id="statusText">

          Ready to connect

        </span>

      </div>

      <!-- VOICE -->

      <button
        id="callBtn"
        class="call-btn"
      >

        📞 Start Voice Call

      </button>

      <!-- CHAT -->

      <div class="chat-container">

        <div class="chat-title">

          Chat Assistant

        </div>

        <div id="messages"></div>

        <div class="input-area">

          <input
            type="text"
            id="userInput"
            placeholder="Ask about projects, skills, experience..."
          />

          <button
            class="send-btn"
            id="sendBtn"
          >

            Send

          </button>

        </div>

      </div>

      <!-- NOTE -->

      <p class="note">

        Responses are grounded in resume,
        GitHub repositories, and project documents.

      </p>

    </div>

  </div>

  <!-- MAIN SCRIPT -->

  <script type="module" src="script.js"></script>

</body>

</html>
